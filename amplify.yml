version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - npm install
    build:
      commands:
        - echo "VITE_API_URL=https://d3uu50tlzv08gz.cloudfront.net/api" > .env.production
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=0, must-revalidate'
    - pattern: 'assets/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
